<form [formGroup]="formUnidadDeMedida">
    <div class="flex flex-column gap-4 flex-1 min-h-0 w-full">
        <ui-input label="Nombre" formControlName="nombre" [maxlength]="maxLengthNombre" [minlength]="minLengthNombre"
            [expReg]="expLockNombre" [patternErrorMessage]="'No debe incluir espacios al final de la palabra'">
        </ui-input>

        <ui-input label="Descripción" formControlName="descripcion" [maxlength]="maxLengthDescripcion"
            [minlength]="minLengthDescripcion" [expReg]="expLockDescripcion"
            [patternErrorMessage]="'No debe incluir espacios al final de la palabra'">
        </ui-input>
    </div>

    <ui-modal-footer [label]="selectUnidadDeMedida().idUnidadDeMedida !== 0 ? 'Actualizar Unidad de Medida' : 'Crear Unidad de Medida'"
        [disabled]="formUnidadDeMedida.invalid" (cancel)="cancelar()" (submit)="guardar()"></ui-modal-footer>
</form>
