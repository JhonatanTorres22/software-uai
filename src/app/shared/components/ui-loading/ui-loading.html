<div class="loading-overlay">
  <div class="loading-card">

    <div class="loading-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2"  y="2"  width="6" height="6" rx="1.5" fill="white" opacity="0.9"/>
          <rect x="10" y="2"  width="6" height="6" rx="1.5" fill="white" opacity="0.5"/>
          <rect x="2"  y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.5"/>
          <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.7"/>
        </svg>
      </div>
      <span class="logo-text">UAI</span>
    </div>

    <div class="pulse-grid">
      @for (d of dots; track $index) {
        <span class="dot" [style.animation-delay]="d + 's'"></span>
      }
    </div>

    <div class="loading-status">
      <!-- <span class="status-label">{{ message }}</span> -->
      <span class="status-sub">Por favor, espere un momento...</span>
    </div>

    <div class="progress-track">
      <div class="progress-bar"></div>
    </div>

  </div>
</div>
