<div class="flex flex-column gap-5">

    <div class="flex align-items-center justify-content-between">
        <span
            class="flex align-items-center gap-2 px-3 py-1 border-round-3xl text-xs font-medium bg-green-100 text-green-700">
            <i class="pi pi-shield"></i>
            Acceso seguro
        </span>

        <div class="flex align-items-center justify-content-center border-round-xl bg-blue-700 w-3rem h-3rem shadow-2">
            <i class="pi pi-id-card text-xl text-white"></i>
        </div>
    </div>

    <div class="flex flex-column gap-3">
        <span class="text-3xl font-bold text-900">
            Verificación de identidad
        </span>

        <div class="flex align-items-start gap-3 p-3 border-round-lg surface-100 mt-3">
            <i class="pi pi-id-card text-600 mt-1"></i>

            <div class="flex flex-column gap-2 ">
                <span class="text-sm font-semibold text-800">
                    Ingresa tu número de documento
                </span>
                <span class="text-xs text-600 line-height-3">
                    Usaremos esta información para identificar tus accesos y roles dentro de la plataforma.
                </span>
            </div>
        </div>
    </div>

    <p-divider class="my-1" />

    <!-- Form -->
    <div class="flex flex-column gap-4" [formGroup]="formLogin">
        
        <p-tag icon="pi pi-lock" severity="info" value="Digite su número de Documento" ></p-tag>

        <p-floatlabel class="mt-3">
            <p-inputNumber 
                [useGrouping]="false"
                formControlName="userName"
                class="w-full"
                (onInput)="userNameIngresado.set($event.value?.toString() || '')"
                inputStyleClass="h-4rem text-lg px-3 border-round-lg">
            </p-inputNumber>

            <label class="text-sm font-medium text-500">
                Número de documento
            </label>
        </p-floatlabel>

    </div>

    <!-- Botón -->
    <div class="flex justify-content-end pt-2">
        <ui-button 
            label="Continuar" 
            icon="pi pi-arrow-right" 
            [disabled]="formLogin.invalid"
            styleClass="px-4 py-2 text-sm font-medium"
            (onClick)="buscar()">
        </ui-button>
    </div>

</div>
