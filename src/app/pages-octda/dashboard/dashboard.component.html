<div class="dashboard-page">
  <!-- Header -->
  <div class="dashboard-header mb-4">
    <div>
      <h1 class="dashboard-title">Dashboard de Trámites</h1>
    
    </div>
  </div>

  <!-- Loading State -->
  @if (loading()) {
    <app-ui-loading></app-ui-loading>
  }
  @else {
    <!-- Cards de Estados -->
    <app-cards-dashboard />

    <!-- Gráficos Row 1: Donut + Mensual -->
    <div class="grid mb-4">
      <div class="col-12 lg:col-6">
        <app-dashboard-donut-chart  />
      </div>
      <div class="col-12 lg:col-6">
        <app-dashboard-tramites-mes-chart />
      </div>
    </div>

    <!-- Gráfico Row 2: Subcategorías -->
    <div class="grid">
      <div class="col-12">
        <app-dashboard-subcategoria-chart />
      </div>
    </div>
  }
</div>
