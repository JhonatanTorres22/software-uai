<div class="mb-4">
  <div class="grid">
    @for (card of estadosCards(); track card.estado) {
      <div class="col-12 sm:col-6 lg:col-3">
        <div class="estado-card surface-card border-round-lg p-3 shadow-2 transition-all transition-duration-200" [ngClass]="card.cardClass">
          <div class="card-shine"></div>

          <div class="flex align-items-center justify-content-between mb-3">
            <span class="card-tag text-xs font-semibold px-3 py-2 border-round-lg uppercase">{{ card.label }}</span>
            <div class="card-icon-wrap w-3rem h-3rem border-circle flex align-items-center justify-content-center">
              <i [class]="card.icon" class="text-xl"></i>
            </div>
          </div>

          <div class="card-num text-5xl font-bold mb-1 line-height-2">{{ card.count }}</div>
          <div class="card-footer text-sm text-600">{{ card.footerText }}</div>
        </div>
      </div>
    }
  </div>
</div>
