<div class="cards-dashboard-container">
  <div class="grid">
    @for (card of estadosCards(); track card.estado) {
      <div class="col-12 sm:col-6 lg:col-3">
        <div class="estado-card border-round-2xl p-2" [ngClass]="card.cardClass">
          <div class="card-shine"></div>

          <div class="flex align-items-center justify-content-between">
            <span class="card-tag text-xs font-bold p-2 border-round-2xl uppercase line-height-4">{{ card.label }}</span>
            <div class="card-icon-wrap w-3rem h-3rem border-circle flex align-items-center justify-content-center">
              <i [class]="card.icon" class="text-2xl font-bold"></i>
            </div>
          </div>

          <div class="card-num text-6xl font-bold mb-1 line-height-2">{{ card.count }}</div>
          <!-- <div class="card-label">{{ card.label }}</div> -->
        </div>
      </div>
    }
  </div>
</div>
