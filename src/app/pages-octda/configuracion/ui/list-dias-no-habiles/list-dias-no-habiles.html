<!-- <pre> {{orderedDiasNoHabiles() | json}} </pre> -->
<div class="grid">
    <div class="col-12 xl:col-8 p-2">
        <div class=" card-erp h-full p-3 border-round-lg">
            <div class="flex flex-column gap-2 mb-3">
                <h3 class="m-0 text-brand">Calendario {{ yearLimit }}</h3>
                <!-- <small class="text-secondary">Selecciona una fecha para registrar un día no hábil</small> -->
                <div class="flex flex-wrap gap-2">
                    <p-tag value="Año {{ yearLimit }}" severity="info"></p-tag>
                    <p-tag value="Solo fechas válidas" severity="success"></p-tag>
                    @if (selectedDate()) {
                    <p-tag [value]="'Seleccionado: ' + selectedDateLabel()" severity="warn"></p-tag>
                    }
                </div>
            </div>

            <div class="border-1 border-round border-200 overflow-hidden surface-ground">
                <p-datepicker [ngModel]="selectedDate()" (onSelect)="onCalendarSelect($event)" [inline]="true"
                    [showWeek]="true" [minDate]="minDate" [maxDate]="maxDate" [readonlyInput]="true"
                    [numberOfMonths]="1" [firstDayOfWeek]="1" styleClass="w-full">
                </p-datepicker>
            </div>
        </div>
    </div>

    <div class="col-12 xl:col-4 p-2">
        <div class=" card-erp h-full p-3 border-round-lg">
            <div class="flex flex-column gap-2 mb-3">
                <h3 class="m-0 text-brand">Configurar Día No Hábil</h3>
                <div class="flex flex-wrap gap-2">
                    <p-tag [value]="isEditing ? 'Modo edición' : 'Nuevo registro'"
                        [severity]="isEditing ? 'warn' : 'success'"></p-tag>
                </div>
            </div>

            <form [formGroup]="form" class="flex flex-column gap-3" (ngSubmit)="saveDiaNoHabil()">
                <div class="flex flex-column gap-2">
                    <ui-input formControlName="fecha" [ngModel]="selectedDateLabel()" label="Fecha seleccionada" [readonly]="true" [disabled]="true"></ui-input>
                </div>

                <div class="flex flex-column gap-2">
                    <ui-text-area formControlName="motivo" [maxlength]="240"
                        label="Motivo del día no hábil"></ui-text-area>
                </div>

                <div class="flex justify-content-end gap-2 mt-1">
                    @if (isEditing) {
                    <ui-button icon="pi pi-times" label="Cancelar" color="secondary"
                        (onClick)="cancelEdit()"></ui-button>
                    }
                    <ui-button [label]="isEditing ? 'Guardar cambios' : 'Guardar'" icon="pi pi-save"
                        [disabled]="!canSubmit"></ui-button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="card-erp p-3 border-round-lg mt-2 xl:mt-3 overflow-hidden">
    <p-table #dt size="small" [value]="orderedDiasNoHabiles()" [sortMode]="'single'" [showCurrentPageReport]="true"
        [rowsPerPageOptions]="[5, 10, 25]" [globalFilterFields]="[ 'fecha','motivo','creadoEn' ]"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
        styleClass="p-datatable-sm p-datatable-striped p-datatable-gridlines shadow-2 border-round-xl overflow-hidden"
        [tableStyle]="{ 'min-width': '56rem' }">

        <ng-template pTemplate="caption">
            <div class="flex flex-column md:flex-row gap-3 md:align-items-center md:justify-content-between">
                <div class="flex align-items-center gap-2 flex-wrap">
                    <p-tag [value]="orderedDiasNoHabiles().length + ' Días No Hábiles'" severity="info" [rounded]="true"
                        icon="pi pi-list">
                    </p-tag>
                </div>
                <div class="flex align-items-center gap-2 flex-shrink-0 flex-nowrap">
                    <p-iconField iconPosition="left" class="w-full">
                        <p-inputIcon>
                            <i class="pi pi-search"></i>
                        </p-inputIcon>

                        <input pInputText type="text" class="w-full"
                            (input)="dt.filterGlobal($any($event.target).value, 'contains')"
                            placeholder="Buscar día no hábil..." />
                    </p-iconField>
                    <ui-button label="Nuevo Día No Hábil" icon="pi pi-plus"
                        styleClass="white-space-nowrap flex-shrink-0" [style]="{ 'white-space': 'nowrap' }">
                    </ui-button>
                </div>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 14rem">Fecha</th>
                <th>Motivo del día</th>
                <th style="width: 8rem" class="text-center">Estado</th>
                <th style="width: 9rem" class="text-center">Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
            <tr>
                <td>{{ formatDate(item.fecha) }}</td>
                <td>{{ item.motivo }}</td>
                <td class="text-center">
                    <p-tag [value]="isDateRegistered(item.fecha) ? 'Activo' : 'Inactivo'" severity="info"></p-tag>
                </td>
                <td>
                    <div class="flex justify-content-center gap-1">
                        <ui-icon-button icon="pi pi-pencil" (click)="startEdit(item)" tooltip="Editar"></ui-icon-button>
                        <ui-icon-button icon="pi pi-trash" (click)="remove(item)" color="danger" tooltip="Eliminar"></ui-icon-button>
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="4" class="text-center py-4 text-500">
                    <app-ui-card-no-items message="No se han encontrado días no hábiles"></app-ui-card-no-items>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
