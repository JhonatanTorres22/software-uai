<div class="flex align-items-center justify-content-between">
    <div>
        <h2 class="m-0 text-xl font-bold text-brand">{{ isEditMode() ? 'Editar Trámite' : 'Generar Trámite' }}</h2>
    </div>
    <ui-icon-button icon="pi pi-times" color="danger" (onClick)="closeDrawer()"></ui-icon-button>
</div>

<div class="flex-1 min-h-0 overflow-y-auto md:p-4">
    <p-stepper [value]="activeStep()" class="w-full" [linear]="true">
        <p-step-list>
            <p-step [value]="1">{{ isEditMode() ? 'Editar Trámite' : 'Generar Trámite' }}</p-step>
            <p-step [value]="2">{{ isEditMode() ? 'Editar Formato Solicitud' : 'Generar Formato Solicitud' }}</p-step>
        </p-step-list>

        <p-step-panels>
            <p-step-panel [value]="1">
                <ng-template #content>
                    <div class="p-4 surface-card border-1 surface-border border-round-xl">
                        <app-datos-tramite (tramiteRegistrado)="onTramiteRegistrado($event)"></app-datos-tramite>
                        <div class="flex justify-content-end mt-4">
                            <ui-button [label]="actionLabel" icon="pi pi-arrow-right"
                                (onClick)="registrarYContinuar()"></ui-button>
                        </div>
                    </div>
                </ng-template>
            </p-step-panel>

            <p-step-panel [value]="2">
                <ng-template #content>
                    <app-formato-solicitud [solicitudData]="solicitudData()"></app-formato-solicitud>
                    <div class="flex justify-content-start mt-4">
                        <p-button label="Volver" icon="pi pi-arrow-left" severity="secondary"
                            (onClick)="setStep(1)" />
                    </div>
                </ng-template>
            </p-step-panel>
        </p-step-panels>
    </p-stepper>
</div>
