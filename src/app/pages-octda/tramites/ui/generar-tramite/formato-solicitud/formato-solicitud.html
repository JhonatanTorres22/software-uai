<form [formGroup]="formSolicitud" class="w-full surface-card border-1 surface-border border-round-xl p-4">
    <div class="grid formgrid">
        <div class="col-12 md:col-6">
            <ui-input formControlName="destinatario" label="Destinatario" [maxlength]="120" [readonly]="true"></ui-input>
        </div>

        <div class="col-12 md:col-6">
            <ui-input formControlName="fecha" label="Fecha" [maxlength]="20" [readonly]="true" [upperCase]="false"></ui-input>
        </div>

        <div class="col-12">
            <ui-input formControlName="datosUsuario" label="Nombre completo" [maxlength]="120" [readonly]="true"></ui-input>
        </div>

        <div class="col-12 md:col-4">
            <ui-input formControlName="numeroContacto" label="Numero de contacto" [maxlength]="9" [readonly]="true" [upperCase]="false"></ui-input>
        </div>

        <div class="col-12 md:col-4">
            <ui-input formControlName="numeroDocumento" label="Numero de documento" [maxlength]="12" [readonly]="true" [upperCase]="false"></ui-input>
        </div>

        <div class="col-12 md:col-4">
            <ui-input formControlName="email" label="Email" [maxlength]="120" [readonly]="true" [upperCase]="false"></ui-input>
        </div>

        <div class="col-12">
            <ui-text-area formControlName="fundamento" label="Fundamento" [rows]="5" [maxlength]="1000" [readonly]="true"></ui-text-area>
        </div>

        <div class="col-12">
            <ui-text-area formControlName="anexos" label="Anexos" [rows]="3" [maxlength]="500" [readonly]="true"></ui-text-area>
        </div>

        <div class="col-12 md:col-8">
            <ui-input formControlName="firma" label="Firma" [maxlength]="120"></ui-input>
        </div>

        <div class="col-12 md:col-4 flex align-items-center">
            <div class="flex align-items-center gap-2 mt-3">
                <p-checkbox formControlName="conformidad" [binary]="true" inputId="conformidad"></p-checkbox>
                <label for="conformidad" class="text-sm">Declaro conformidad con la informacion registrada</label>
            </div>
        </div>
    </div>

    <div class="flex justify-content-end mt-4">
        <ui-button 
            [label]="isEditMode() ? 'Actualizar Formato' : 'Generar Formato'" 
            [disabled]="invalid" 
            (onClick)="generarTramite()"
            [icon]="isEditMode() ? 'pi pi-check' : 'pi pi-save'">
        </ui-button>
    </div>
</form>
