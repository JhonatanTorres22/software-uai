<p-card styleClass="h-full">

  <ng-template #header>
    <div class="flex justify-content-between gap-2 p-2">
      <h2 class="text-base text-900 font-semibold">
        {{ selectSubCategoria().nombre }}
      </h2>
      <ui-icon-button icon="pi pi-times" pTooltip="Cerrar" color="danger" (onClick)="cerrar.emit()"></ui-icon-button>
    </div>
    <p-divider styleClass=""></p-divider>
  </ng-template>

  <!-- <pre> {{listRutas() | json}} </pre> -->
  <div class="px-3 md:px-4 pb-4">
    <!-- <pre> {{listRutas() | json}} </pre> -->

    <app-list-rutas-subcategoria></app-list-rutas-subcategoria>

    <!-- INSERTAR -->



    <p-divider styleClass="my-3"></p-divider>


    <div class="flex align-items-center gap-2 mb-3">
      <i class="pi pi-file text-brand"></i>
      <h3 class="m-0 text-900 text-base font-semibold">Archivos requeridos</h3>
    </div>

    <div class="grid">
      @for (archivo of detalle().archivosRequeridos; track $index) {
      <div class="col-12 md:col-6">
        <article class="border-1 surface-border border-round p-3 h-full bg-white">
          <div class="flex align-items-start justify-content-between gap-3">
            <h4 class="m-0 text-900">{{ archivo.nombreDocumento }}</h4>
            <p-tag [value]="formatosLabel(archivo)" severity="secondary"></p-tag>
          </div>
        </article>
      </div>
      }
    </div>
  </div>
</p-card>
