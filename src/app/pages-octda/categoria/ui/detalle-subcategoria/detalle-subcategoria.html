<p-card styleClass="h-full">

  <!-- Header -->
  <ng-template #header>
    <div class="flex align-items-center justify-content-between px-3 pt-3">
      <div class="gap-4 flex align-items-center">
        <span class="font-bold text-lg text-900">
          {{ selectSubCategoria().nombre }}
        </span>
      </div>

      <ui-icon-button icon="pi pi-times" pTooltip="Cerrar" color="danger" (onClick)="cerrar.emit()">
      </ui-icon-button>
    </div>
  </ng-template>

  <div class="surface-50 border-round border-1 surface-border p-4 mb-3">
    <div class="flex align-items-center gap-2 mb-3">
      <i class="pi pi-align-left text-primary"></i>
      <span class="font-semibold text-900">Descripción</span>
    </div>

    <p class="m-0 text-700 line-height-3">
      {{ selectSubCategoria().descripcion || 'Sin descripción registrada.' }}
    </p>

    <p-divider styleClass="my-3"></p-divider>

    <div class="flex align-items-center justify-content-between flex-wrap gap-2">
      <span class="text-500">Código Subcategoría</span>
      <p-tag [value]="selectSubCategoria().idSubCategoriaTramite.toString()" severity="info"></p-tag>
    </div>

    <div class="flex align-items-center justify-content-between flex-wrap gap-2 mt-2">
      <span class="text-500">Código Categoría</span>
      <p-tag [value]="selectSubCategoria().idCategoriaTramite.toString()" severity="secondary"></p-tag>
    </div>
  </div>

  <!-- Footer -->
  <ng-template #footer>
    <div class="flex gap-2 justify-content-end pt-2">
      <ui-button label="Volver" icon="pi pi-arrow-left" (onClick)="cerrar.emit()">
      </ui-button>
    </div>
  </ng-template>

</p-card>
