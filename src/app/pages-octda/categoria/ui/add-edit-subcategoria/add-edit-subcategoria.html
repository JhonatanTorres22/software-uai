<form [formGroup]="formSubCategoria" class="w-full">
  <div class="flex flex-column gap-4">
    <div class="surface-50 border-1 surface-border border-round p-3">
      <div class="flex align-items-center gap-2 mb-3">
        <i class="pi pi-folder text-primary"></i>
        <span class="font-semibold text-900">Datos de la Subcategoría</span>
      </div>

      <div class="grid">
        <div class="col-12 md:col-6">
          <label for="nombreSubCategoria" class="block text-sm font-medium text-700 mb-2">
            Nombre <span class="text-red-500">*</span>
          </label>
          <input
            id="nombreSubCategoria"
            pInputText
            class="w-full"
            formControlName="nombre"
            placeholder="Ej: Certificación Académica"
            [maxlength]="100" />
          <small class="text-red-500" *ngIf="getError('nombre')">{{ getError('nombre') }}</small>
        </div>

        <div class="col-12 md:col-6">
          <label for="descripcionSubCategoria" class="block text-sm font-medium text-700 mb-2">
            Descripción <span class="text-red-500">*</span>
          </label>
          <textarea
            id="descripcionSubCategoria"
            pTextarea
            class="w-full"
            rows="4"
            formControlName="descripcion"
            placeholder="Describe de forma clara el propósito de esta subcategoría"
            [maxlength]="255">
          </textarea>
          <small class="text-red-500" *ngIf="getError('descripcion')">{{ getError('descripcion') }}</small>
        </div>
      </div>
    </div>

    <div class="surface-0 border-round border-1 surface-border p-3 flex flex-column gap-2">
      <span class="text-sm text-700">Resumen rápido</span>
      <div class="flex align-items-center justify-content-between flex-wrap gap-2">
        <span class="text-sm text-500">Categoría asociada</span>
        <span class="text-sm font-medium text-900">ID {{ categoriaId }}</span>
      </div>
      <div class="flex align-items-center justify-content-between flex-wrap gap-2">
        <span class="text-sm text-500">Modo</span>
        <span class="text-sm font-medium text-900">{{ modoEdicion ? 'Edición' : 'Creación' }}</span>
      </div>
    </div>
  </div>
</form>
