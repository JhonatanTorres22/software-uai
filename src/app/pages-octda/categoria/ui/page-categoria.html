<div class="font-bold text-lg"> GESTIÓN DE CATEGORÍAS Y SUBCATEGORÍAS </div>

  <p-divider></p-divider>
  <div class="grid">
    <div [class]="selectSubCategoria().id !== 0 ? 'col-12 md:col-6 lg:col-5' : 'col-12'">

      <app-list-categoria></app-list-categoria>

      <div class="mt-3">
        <app-list-subcategoria
          (subcategoriaVer)="onVerSubcategoria($event)">
        </app-list-subcategoria>
      </div>

    </div>

    @if (selectSubCategoria().id !== 0) {
      <div class="col-12 md:col-6 lg:col-7">
        <app-detalle-subcategoria
          (cerrar)="onCerrarDetalle()">
        </app-detalle-subcategoria>
      </div>
    }

  </div>
